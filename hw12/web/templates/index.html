<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Recommendation Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #e94560;
            margin: 20px 0;
            font-size: 1.8em;
        }
        .chat-box {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .message {
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .message.user {
            text-align: right;
        }
        .message.user .bubble {
            background: #e94560;
            color: white;
            display: inline-block;
            padding: 10px 16px;
            border-radius: 18px 18px 4px 18px;
            max-width: 80%;
            text-align: left;
        }
        .message.assistant .bubble {
            background: #0f3460;
            color: #e0e0e0;
            display: inline-block;
            padding: 10px 16px;
            border-radius: 18px 18px 18px 4px;
            max-width: 85%;
            white-space: pre-wrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.92em;
            text-align: left;
        }
        /* Markdown rendered content styles */
        .bubble h1, .bubble h2, .bubble h3 {
            color: #e94560;
            margin: 8px 0 4px 0;
            font-size: 1.1em;
        }
        .bubble h2 { font-size: 1em; }
        .bubble h3 { font-size: 0.95em; }
        .bubble strong {
            color: #fff;
            font-weight: 600;
        }
        .bubble em {
            color: #ccc;
            font-style: italic;
        }
        .bubble ul, .bubble ol {
            margin: 4px 0 4px 20px;
        }
        .bubble li {
            margin-bottom: 4px;
        }
        .bubble code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.88em;
        }
        .bubble pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .bubble pre code {
            background: none;
            padding: 0;
        }
        .bubble p {
            margin: 4px 0;
        }
        .bubble .anime-card {
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #e94560;
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 4px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area textarea {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #e0e0e0;
            font-size: 1em;
            resize: none;
            min-height: 50px;
        }
        .input-area textarea:focus {
            outline: none;
            border-color: #e94560;
        }
        .input-area button {
            padding: 12px 24px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover {
            background: #c73650;
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .clear-btn {
            background: none;
            border: 1px solid #555;
            color: #888;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
        .clear-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Quick action buttons */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .quick-btn {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid #e94560;
            color: #e94560;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #e94560;
            color: white;
        }
        /* Loading animation */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 10px 16px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
    </style>
    <!-- Markdown rendering library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎬 Anime Recommendation Agent</h1>
        <div class="header-actions">
            <div class="status" id="status">Введите запрос об аниме</div>
            <button class="clear-btn" onclick="clearChat()">Очистить</button>
        </div>
        <!-- Quick action buttons -->
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('что сейчас популярно?')">🔥 Тренды</button>
            <button class="quick-btn" onclick="sendQuickMessage('найди топ аниме жанра романтика')">🎭 По жанру</button>
            <button class="quick-btn" onclick="sendQuickMessage('посоветуй что-то похожее на Cowboy Bebop')">⭐ Похожее</button>
            <button class="quick-btn" onclick="sendQuickMessage('какие жанры доступны?')">📋 Жанры</button>
        </div>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <textarea id="messageInput" rows="2"
                placeholder="Например: найди аниме Cowboy Bebop"
                onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');

        // Configure marked.js
        marked.setOptions({
            breaks: true,
            gfm: true,
        });

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (role === 'assistant') {
                // Render markdown for assistant messages
                try {
                    bubble.innerHTML = marked.parse(content);
                } catch (e) {
                    bubble.textContent = content;
                }
            } else {
                bubble.textContent = content;
            }

            msgDiv.appendChild(bubble);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTypingIndicator() {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message assistant`;
            msgDiv.id = 'typingIndicator';
            const bubble = document.createElement('div');
            bubble.className = 'bubble typing-indicator';
            bubble.innerHTML = '<span></span><span></span><span></span>';
            msgDiv.appendChild(bubble);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            sendBtn.textContent = loading ? 'Обработка...' : 'Отправить';
            messageInput.disabled = loading;
            statusEl.textContent = loading ? 'Агент обрабатывает запрос...' : 'Введите запрос об аниме';
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            messageInput.value = '';
            setLoading(true);
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                removeTypingIndicator();
                const data = await response.json();
                addMessage('assistant', data.response);
            } catch (err) {
                removeTypingIndicator();
                addMessage('assistant', 'Ошибка: не удалось получить ответ от агента');
            } finally {
                setLoading(false);
                messageInput.focus();
            }
        }

        function sendQuickMessage(message) {
            messageInput.value = message;
            sendMessage();
        }

        async function clearChat() {
            if (!confirm('Очистить историю чата?')) return;
            await fetch('/api/clear', { method: 'POST' });
            chatBox.innerHTML = '';
            statusEl.textContent = 'История очищена';
        }

        // Load history on page load
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                if (data.history) {
                    data.history.forEach(msg => addMessage(msg.role, msg.content));
                }
            } catch (err) {
                // No history yet
            }
        }
        loadHistory();
        messageInput.focus();
    </script>
</body>
</html>
