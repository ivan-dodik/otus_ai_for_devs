name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio responses

      - name: Run unit tests
        run: |
          pytest tests/test_session_store.py tests/test_kitsu_tools.py tests/test_config.py -v

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Skip if Ollama is not available
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio responses

      - name: Start Ollama (if available)
        run: |
          # Check if Ollama is installed, if not skip
          if ! command -v ollama &> /dev/null; then
            echo "Ollama not installed, skipping E2E tests"
            exit 0
          fi
          ollama serve &
          sleep 5

      - name: Run E2E tests (if Ollama available)
        run: |
          # E2E tests require Ollama with models
          # Skip if models not available
          pytest tests/test_e2e.py -v --tb=short || echo "E2E tests skipped (Ollama not available)"

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .